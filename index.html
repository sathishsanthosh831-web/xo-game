<!DOCTYPE html>
<html>
<head>
  <title>X-O Number Room</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; text-align: center; background: #121212; color: white; margin: 0; padding: 20px; }
    h1 { color: #00ff88; }
.board { display: grid; grid-template-columns: repeat(3, 90px); gap: 5px; margin: 20px auto; width: 280px; }
.cell { width: 90px; height: 90px; background: #1e1e1e; border: 2px solid #00ff88; font-size: 50px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    button { background: #00ff88; color: black; border: none; padding: 15px 25px; font-size: 18px; margin: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    input { padding: 12px; font-size: 20px; width: 150px; text-align: center; border-radius: 8px; border: none; letter-spacing: 5px; }
    #status { font-size: 18px; margin: 15px; height: 40px; }
    #roomCode { font-size: 32px; color: #00ff88; font-weight: bold; letter-spacing: 8px; }
  </style>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
  <h1>X-O Game ❌⭕</h1>

  <div id="menu">
    <button onclick="createRoom()">Create Room</button>
    <p>OR</p>
    <input type="number" id="joinInput" placeholder="1234" maxlength="4">
    <button onclick="joinRoom()">Join Room</button>
  </div>

  <div id="game" style="display:none;">
    <p>Room Number</p>
    <p id="roomCode"></p>
    <p id="status">Connecting...</p>
    <div class="board" id="board"></div>
    <button onclick="location.reload()">Exit</button>
  </div>

  <script>
    let peer, conn, player, currentPlayer = 'X';
    let board = ['', '', '', '', '', '', '', '', ''];
    let gameActive = false;

    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');

    for (let i = 0; i < 9; i++) {
      const cell = document.createElement('div');
      cell.classList.add('cell');
      cell.addEventListener('click', () => makeMove(i));
      boardEl.appendChild(cell);
    }

    function createRoom() {
      player = 'X';
      // Ipo 4 digit number mattum varum da: 1000 to 9999
      const roomId = Math.floor(1000 + Math.random() * 9000).toString();
      document.getElementById('roomCode').innerText = roomId;
      showGame();
      statusEl.innerText = 'Room create aayiduchu. Friend ku number sollu';

      peer = new Peer('xo-' + roomId); // PeerJS ku mattum 'xo-' serthurom
      peer.on('connection', c => {
        conn = c;
        setupConnection();
        gameActive = true;
        statusEl.innerText = 'Friend vandhutan! Nee X. Un Turn';
      });
    }

    function joinRoom() {
      player = 'O';
      const roomId = document.getElementById('joinInput').value;
      if (roomId.length!== 4) return alert('4 digit number podu da');
      document.getElementById('roomCode').innerText = roomId;
      showGame();
      statusEl.innerText = 'Connecting...';

      peer = new Peer();
      peer.on('open', () => {
        conn = peer.connect('xo-' + roomId); // 'xo-' serthu connect panrom
        setupConnection();
      });
    }

    function showGame() {
      document.getElementById('menu').style.display = 'none';
      document.getElementById('game').style.display = 'block';
    }

    function setupConnection() {
      conn.on('open', () => {
        gameActive = true;
        if (player === 'O') statusEl.innerText = 'Connected! Nee O. Host Turn...';
      });
      conn.on('data', data => {
        board = data.board;
        currentPlayer = data.currentPlayer;
        gameActive = data.gameActive;
        updateBoard();
        updateStatus();
      });
      conn.on('close', () => {
        gameActive = false;
        statusEl.innerText = 'Friend poitan 😭';
      });
    }

    function makeMove(index) {
      if (!gameActive || board[index]!== '' || currentPlayer!== player) return;
      board[index] = player;
      currentPlayer = player === 'X'? 'O' : 'X';
      const winner = checkWinner();
      const draw =!board.includes('');
      if (winner || draw) gameActive = false;

      if (conn && conn.open) {
        conn.send({ board, currentPlayer, gameActive });
      }
      updateBoard();
      updateStatus();
    }

    function updateBoard() {
      const cells = document.querySelectorAll('.cell');
      cells.forEach((cell, i) => {
        cell.innerText = board[i];
        cell.style.color = board[i] === 'X'? '#ff4757' : '#00ff88';
      });
    }

    function updateStatus() {
      const winner = checkWinner();
      if (winner) {
        statusEl.innerText = winner === player? 'Nee Jeyichita! 🎉' : 'Friend jeyichitan 😭';
      } else if (!board.includes('')) {
        statusEl.innerText = 'Draw da!';
      } else {
        statusEl.innerText = currentPlayer === player? 'Un Turn da' : 'Friend Turn...';
      }
    }

    function checkWinner() {
      const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
      for (let w of wins) {
        if (board[w[0]] && board[w[0]] === board[w[1]] && board[w[0]] === board[w[2]]) return board[w[0]];
      }
      return null;
    }
  </script>
</body>
</html>
